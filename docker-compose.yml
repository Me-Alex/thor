services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://thor:thor@db:5432/thor
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=thor
      - POSTGRES_USER=thor
      - POSTGRES_PASSWORD=thor
    ports:
      - "5432:5432"
    volumes:
      - thor_data:/var/lib/postgresql/data
volumes:
  thor_data:
